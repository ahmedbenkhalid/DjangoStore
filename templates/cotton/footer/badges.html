{% load i18n %}

<div class="col-md-6">
  <h6 class="fw-semibold small text-uppercase text-muted mb-3" style="letter-spacing: 0.03em;">{% trans "We Accept" %}</h6>
  <div class="d-flex flex-wrap gap-2">
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-cash text-accent"></i> {% trans "Cash on Delivery" %}
    </span>
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-credit-card text-accent"></i> Visa
    </span>
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-credit-card-2-front text-accent"></i> Mastercard
    </span>
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-qr-code text-accent"></i> Fawry
    </span>
  </div>
</div>
<div class="col-md-6 mt-4 mt-md-0">
  <h6 class="fw-semibold small text-uppercase text-muted mb-3" style="letter-spacing: 0.03em;">{% trans "Secure Shopping" %}</h6>
  <div class="d-flex flex-wrap gap-2">
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-shield-lock text-accent"></i> SSL
    </span>
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-lock text-accent"></i> PCI
    </span>
    <span class="badge bg-light text-body border d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-check-circle text-accent"></i> {% trans "Verified" %}
    </span>
  </div>
</div>
