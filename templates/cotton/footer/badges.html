{% load i18n %}

<div class="col-md-6">
  <h6 class="footer-subheading fw-semibold small text-uppercase mb-3" style="color: #cbd5e1; letter-spacing: 0.03em;">{% trans "We Accept" %}</h6>
  <div class="d-flex flex-wrap gap-2 payment-methods">
    <span class="payment-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-cash"></i> {% trans "Cash on Delivery" %}
    </span>
    <span class="payment-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-credit-card"></i> Visa
    </span>
    <span class="payment-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-credit-card-2-front"></i> Mastercard
    </span>
    <span class="payment-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-qr-code"></i> Fawry
    </span>
  </div>
</div>
<div class="col-md-6 mt-4 mt-md-0">
  <h6 class="footer-subheading fw-semibold small text-uppercase mb-3" style="color: #cbd5e1; letter-spacing: 0.03em;">{% trans "Secure Shopping" %}</h6>
  <div class="d-flex flex-wrap gap-2 security-badges">
    <span class="security-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-shield-lock"></i> SSL
    </span>
    <span class="security-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-lock"></i> PCI
    </span>
    <span class="security-badge d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 small" style="font-size: 0.75rem;">
      <i class="bi bi-check-circle"></i> {% trans "Verified" %}
    </span>
  </div>
</div>
