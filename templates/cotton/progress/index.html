<c-vars value min="0" max="100"></c-vars>
<div
    class="progress {% if class %}{{ class }}{% endif %}"
    role="progressbar"
    aria-valuenow="{{ value }}"
    aria-valuemin="{{ min }}"
    aria-valuemax="{{ max }}"
    style="height: 8px; border-radius: 100px;"
    {{ attrs }}
>
    <div
        class="progress-bar bg-accent"
        style="width: {% widthratio value max 100 %}%; border-radius: 100px;"
    >
        {{ slot }}
    </div>
</div>
