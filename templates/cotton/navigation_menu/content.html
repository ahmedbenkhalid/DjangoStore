<c-vars index></c-vars>
<div
    x-show="activeIndex === '{{ index }}'"
    x-transition
    @mouseleave="closeAll()"
    class="dropdown-menu show shadow-lg border-0 p-3 {% if class %}{{ class }}{% endif %}"
    style="border-radius: var(--radius-md); min-width: 220px;"
    x-cloak
    {{ attrs }}
>
    {{ slot }}
</div>
