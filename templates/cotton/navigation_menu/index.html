<nav
    x-data="{
        activeIndex: null,
        setActiveIndex(index) { this.activeIndex = index === this.activeIndex ? null : index; },
        closeAll() { this.activeIndex = null; }
    }"
    @click.away="closeAll()"
    @keydown.escape.window="closeAll()"
    class="navbar-nav {% if class %}{{ class }}{% endif %}"
    {{ attrs }}
>
    {{ slot }}
</nav>
