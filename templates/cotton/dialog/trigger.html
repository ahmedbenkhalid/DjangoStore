<c-vars as_child="false"></c-vars>
{% if as_child == "true" %}
    <div @click.stop="$dispatch('show-dialog')" class="{% if class %}{{ class }}{% endif %}" {{ attrs }}>
        {{ slot }}
    </div>
{% else %}
    <div @click.stop="$dispatch('show-dialog')" class="{% if class %}{{ class }}{% endif %}" {{ attrs }}>
        {{ slot }}
    </div>
{% endif %}
