<template x-teleport="body">
    <div x-show="open" x-cloak>
        <div class="modal-backdrop show" @click="hideDialog"></div>
        <div class="modal d-block" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg {% if class %}{{ class }}{% endif %}" style="border-radius: var(--radius-lg);">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-3 z-1" @click="hideDialog"></button>
                    <div class="modal-body p-4">
                        {{ slot }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
