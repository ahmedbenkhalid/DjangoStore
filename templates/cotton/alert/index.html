<c-vars variant="default"></c-vars>
<div
    class="alert d-flex align-items-start gap-3
    {% if variant == 'default' %}alert-light border
    {% elif variant == 'destructive' %}alert-danger
    {% endif %}
    {% if class %}{{ class }}{% endif %}"
    role="alert"
    {{ attrs }}
>
    {{ slot }}
</div>
