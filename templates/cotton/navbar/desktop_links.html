{% load i18n %}

<ul class="d-none d-lg-flex flex-row list-unstyled mb-0 gap-1 mx-auto">
  <li>
    <a class="nav-link-app text-decoration-none px-3 py-2 rounded-3 d-flex align-items-center gap-1 text-nowrap {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
      {% trans "Home" %}
    </a>
  </li>
  <li>
    <a class="nav-link-app text-decoration-none px-3 py-2 rounded-3 d-flex align-items-center gap-1 text-nowrap {% if 'products' in request.path %}active{% endif %}" href="{% url 'products:products' %}">
      {% trans "Shop" %}
    </a>
  </li>
  <li class="dropdown">
    <a class="nav-link-app dropdown-toggle text-decoration-none px-3 py-2 rounded-3 d-flex align-items-center gap-1 text-nowrap {% if 'category' in request.path %}active{% endif %}" href="#" data-bs-toggle="dropdown">
      {% trans "Categories" %}
    </a>
    <ul class="dropdown-menu border shadow-sm mt-2 rounded-3 p-2" style="min-width: 180px;">
      <li><a class="dropdown-item rounded-2 py-2" href="{% url 'categories:categories' %}">{% trans "All Categories" %}</a></li>
      <li><hr class="dropdown-divider my-1"></li>
      {% for cat in menu_categories %}
        <li><a class="dropdown-item rounded-2 py-2" href="{{ cat.get_absolute_url }}">{{ cat.get_name }}</a></li>
      {% endfor %}
    </ul>
  </li>
</ul>
