{% load i18n %}

<div id="mobileSearch" class="collapse bg-white border-bottom d-lg-none p-2">
    <form action="{% url 'search' %}" class="nav-search-form-app rounded-3 px-3 py-2 d-flex align-items-center gap-2">
      <i class="bi bi-search text-muted flex-shrink-0"></i>
      <input type="text" name="q" placeholder="{% trans 'Search products…' %}" class="nav-search-input-app flex-grow-1" autocomplete="off">
      <button type="submit" class="btn btn-accent btn-sm rounded-2 d-flex align-items-center justify-content-center flex-shrink-0" style="width: 32px; height: 32px;">
        <i class="bi bi-search"></i>
      </button>
    </form>
</div>
