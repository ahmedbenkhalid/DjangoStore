{% load i18n %}

<div id="mobileSearch" class="collapse mob-search-bar d-lg-none  p-2 border-top border-secondary border-opacity-10">
    <form action="{% url 'search' %}" class="mob-search-form rounded-4 px-3 py-2 d-flex align-items-center gap-2">
      <i class="bi bi-search mob-search-icon flex-shrink-0"></i>
      <input type="text" name="q" placeholder="{% trans 'Search products…' %}" class="mob-search-input flex-grow-1" autocomplete="off">
      <button type="submit" class="mob-search-btn border-0 rounded-3 d-flex align-items-center justify-content-center flex-shrink-0" style="width: 30px; height: 30px;">
        <i class="bi bi-search font-weight-bold"></i>
      </button>
    </form>
</div>
