<c-vars value></c-vars>
<li class="nav-item" role="presentation">
    <button
        type="button"
        role="tab"
        class="nav-link px-3 py-2 small fw-bold text-uppercase {% if class %}{{ class }}{% endif %}"
        style="letter-spacing: 0.04em; border-radius: 100px;"
        @click="setActiveTab('{{ value }}')"
        x-bind:class="{ 'active': activeTab === '{{ value }}' }"
        {{ attrs }}
    >
        {{ slot }}
    </button>
</li>
