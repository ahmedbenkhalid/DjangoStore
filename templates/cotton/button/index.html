<c-vars variant="default" size="default"></c-vars>
<button
    class="
    d-inline-flex align-items-center justify-content-center gap-2
    fw-semibold text-decoration-none
    {% if variant == 'default' %}btn btn-accent
    {% elif variant == 'destructive' %}btn btn-danger
    {% elif variant == 'outline' %}btn btn-outline-secondary
    {% elif variant == 'secondary' %}btn btn-light border
    {% elif variant == 'ghost' %}btn btn-link text-body
    {% elif variant == 'link' %}btn btn-link text-accent
    {% elif variant == 'dark' %}btn btn-dark-custom
    {% endif %}
    {% if size == 'default' %}px-4 py-2
    {% elif size == 'xs' %}px-2 py-1 small
    {% elif size == 'sm' %}px-3 py-1
    {% elif size == 'lg' %}px-5 py-3 fs-6
    {% elif size == 'icon' %}p-2
    {% endif %}
    {% if class %}{{ class }}{% endif %}
    "
    {{ attrs }}
>
    {{ slot }}
</button>
