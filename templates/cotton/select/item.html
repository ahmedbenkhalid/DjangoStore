<c-vars value></c-vars>
<div
    data-value="{{ value }}"
    @click="select('{{ value }}', $el.textContent.trim())"
    class="dropdown-item rounded-2 py-2 {% if class %}{{ class }}{% endif %}"
    style="cursor: pointer; font-size: 0.88rem;"
    role="option"
    x-bind:class="{'active': value === '{{ value }}'}"
    {{ attrs }}
>
    {{ slot }}
</div>
