{% load i18n %}
{% load bootstrap_icons %}

{% if not user.is_authenticated %}
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

      <div class="modal-header border-0 pt-4 px-4 pb-2">
        <div class="text-center w-100">
          <h4 class="fw-bold mb-1" id="authModalLabel" style="letter-spacing: -0.02em;">{% trans "Join Us" %}</h4>
          <p class="text-muted small">{% trans "Experience the best of Smart S3R." %}</p>
        </div>
        <button type="button" class="btn-close position-absolute end-0 top-0 m-3 shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body px-4 pt-0">
        <form action="{% url 'register' %}" method="post">
          {% csrf_token %}

          <div class="mb-3">
            <input type="text" name="username" id="modal_username"
                   class="form-control form-control-shadcn" placeholder="{% trans 'Username' %}" required>
          </div>

          <div class="mb-3">
            <input type="email" name="email" id="modal_email"
                   class="form-control form-control-shadcn" placeholder="{% trans 'Email' %}" required>
          </div>

          <div class="row g-2 mb-4">
            <div class="col-6">
              <input type="password" name="password1" id="modal_password1"
                     class="form-control form-control-shadcn" placeholder="{% trans 'Password' %}" required>
            </div>
            <div class="col-6">
              <input type="password" name="password2" id="modal_password2"
                     class="form-control form-control-shadcn" placeholder="{% trans 'Confirm' %}" required>
            </div>
          </div>

          <button type="submit" class="btn btn-dark-custom w-100 py-3 rounded-3 fw-bold mb-3">
            {% trans "Create Account" %}
          </button>
        </form>
      </div>

      <div class="modal-footer border-0 pb-4 pt-0 justify-content-center bg-light">
        <p class="text-muted small mb-0">
          {% trans "Already a member?" %}
          <a href="{% url 'login' %}" class="fw-bold text-body text-decoration-none">{% trans "Log in here" %}</a>
        </p>
      </div>

    </div>
  </div>
</div>
{% endif %}
